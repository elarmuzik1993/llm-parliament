# Cloud config — best quality, requires API keys.
# Set keys via: parliament keys set anthropic sk-ant-...
# Or env vars: ANTHROPIC_API_KEY, OPENAI_API_KEY, GOOGLE_API_KEY

parliament:
  name: "House of AI"

  members:
    - name: "Claude"
      provider: anthropic
      model: claude-sonnet-4-6

    - name: "GPT"
      provider: openai
      model: gpt-4o

    - name: "Gemini"
      provider: google
      model: gemini-2.0-flash

providers:
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
  openai:
    api_key: ${OPENAI_API_KEY}
  google:
    api_key: ${GOOGLE_API_KEY}

# Live debate view — set to false to suppress and only show the final verdict.
display:
  show_debate: true

# Hansard detail level — controls saved .md file and post-run terminal print.
# Override per-call with --hansard or PARLIAMENT_HANSARD_LEVEL.
#   minimal  recommendation only
#   verdict  full synthesis (default)
#   archive  + frontmatter + session footer
#   full     + first-reading and debate transcripts
hansard:
  level: verdict

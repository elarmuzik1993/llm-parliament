# Mixed config — 1 cloud (best Speaker) + 2 local (cheap debate).
# Cheaper than full cloud, better synthesis than full local.

parliament:
  name: "House of AI"

  members:
    - name: "Claude"
      provider: anthropic
      model: claude-sonnet-4-6

    - name: "Llama"
      provider: ollama
      model: llama3.1

    - name: "Gemma"
      provider: ollama
      model: gemma2

providers:
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
  ollama:
    base_url: http://localhost:11434/v1

# Live debate view — set to false to suppress and only show the final verdict.
display:
  show_debate: true

# Hansard detail level — controls saved .md file and post-run terminal print.
# Override per-call with --hansard or PARLIAMENT_HANSARD_LEVEL.
#   minimal  recommendation only
#   verdict  full synthesis (default)
#   archive  + frontmatter + session footer
#   full     + first-reading and debate transcripts
hansard:
  level: verdict
